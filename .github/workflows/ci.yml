name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets
      - name: Test
        run: cargo test
      - name: Test (serde feature)
        run: cargo test -p rainflow-core --features serde

  python:
    name: python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build & smoke-test the wheel
        working-directory: crates/rainflow-python
        run: |
          pip install maturin
          maturin build --release --out dist
          pip install --no-index --find-links dist rainflow
          python - <<'PY'
          import rainflow
          q = rainflow.Gr4j(350.0, -1.5, 90.0, 1.7).run([0.0, 5.0, 2.0], [1.0, 1.0, 1.0])
          assert len(q) == 3 and all(v >= 0 for v in q)
          print("rainflow python OK:", [round(v, 4) for v in q])
          PY
